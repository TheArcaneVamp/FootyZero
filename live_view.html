<!DOCTYPE html>
<html>
<head>
    <title>FootyZero RL Hub v2</title>
    <style>
        body { background: #0a0a0b; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; gap: 40px; padding: 40px; margin: 0; }
        .side-bar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: #161618; padding: 20px; border-radius: 12px; border: 1px solid #2a2a2e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-title { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; font-weight: bold; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .stat-val { font-weight: bold; color: #fff; }
        .team-a { color: #ff5252; }
        .team-b { color: #448aff; }
        
        canvas { background: #1b4d1d; border: 10px solid #161618; border-radius: 16px; box-shadow: 0 30px 100px rgba(0,0,0,0.8); }
        .log { height: 150px; overflow-y: hidden; font-family: monospace; font-size: 12px; color: #888; display: flex; flex-direction: column-reverse; }
        .log-entry { margin-bottom: 4px; padding: 4px 8px; border-radius: 4px; background: rgba(255,255,255,0.03); }
        
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #333; margin-left: 10px; }
        .learning-badge { background: #4caf50; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="side-bar">
        <div class="card">
            <div class="card-title">Live Engine Status</div>
            <div class="stat-row"><span>Match Index</span> <span id="match-num" class="stat-val">-</span></div>
            <div class="stat-row"><span>Round Agent</span> <span id="learning-team" class="stat-val">-</span></div>
            <div class="stat-row"><span>Match Step</span> <span id="step" class="stat-val">-</span></div>
        </div>

        <div class="card">
            <div class="card-title">Tactical Performance</div>
            <div class="stat-row"><span>Team A Wins</span> <span id="wins-a" class="team-a stat-val">0</span></div>
            <div class="stat-row"><span>Team B Wins</span> <span id="wins-b" class="team-b stat-val">0</span></div>
            <div class="stat-row"><span>Draws</span> <span id="draws" class="stat-val">0</span></div>
            <div style="margin: 10px 0; border-top: 1px solid #222;"></div>
            <div class="stat-row"><span>Goals (Total)</span> <span><span class="team-a" id="goals-a">0</span> : <span class="team-b" id="goals-b">0</span></span></div>
        </div>

        <div class="card">
            <div class="card-title">Match Events</div>
            <div id="event-log" class="log"></div>
        </div>
    </div>

    <div style="text-align: center;">
        <div id="main-score" style="font-size: 48px; font-weight: 900; margin-bottom: 20px; letter-spacing: -2px;">
            <span class="team-a" id="score-a">0</span><span style="color:#444; margin: 0 20px;">-</span><span class="team-b" id="score-b">0</span>
        </div>
        <canvas id="pitch" width="370" height="570"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('pitch');
        const ctx = canvas.getContext('2d');
        let lastScore = [0,0];
        let lastPossession = 0;
        let lastMatch = -1;

        function addLog(msg, type) {
            const log = document.getElementById('event-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString([], {hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit'});
            entry.innerHTML = `<span style="color:#555">[${time}]</span> ${msg}`;
            log.prepend(entry);
            if (log.childNodes.length > 10) log.removeChild(log.lastChild);
        }

        async function update() {
            try {
                const response = await fetch('live_state.json?t=' + Date.now());
                const state = await response.json();

                // 1. Detect Events
                if (state.match !== lastMatch) {
                    if (lastMatch !== -1) addLog("MATCH STARTED: #" + state.match);
                    lastMatch = state.match;
                }
                if (state.score[0] > lastScore[0]) { addLog("<b class='team-a'>GOAL!</b> Team A scores", "a"); }
                if (state.score[1] > lastScore[1]) { addLog("<b class='team-b'>GOAL!</b> Team B scores", "b"); }
                lastScore = [...state.score];

                // 2. Draw Pitch
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // Grass Stripes
                for(let i=0; i<10; i++) {
                    ctx.fillStyle = i % 2 === 0 ? "#1b4d1d" : "#1e5420";
                    ctx.fillRect(0, i * 57, 370, 57);
                }
                // Lines
                ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 2;
                ctx.strokeRect(5, 5, 360, 560);
                ctx.beginPath(); ctx.moveTo(5, 285); ctx.lineTo(365, 285); ctx.stroke();
                ctx.beginPath(); ctx.arc(185, 285, 45, 0, Math.PI*2); ctx.stroke();
                
                // Goals
                ctx.strokeStyle = "white"; ctx.lineWidth = 4;
                ctx.strokeRect(160, 0, 50, 6); ctx.strokeRect(160, 564, 50, 6);

                // 3. Teams
                state.team1.forEach(p => drawPlayer(p[0]*5, p[1]*5, "#ff5252"));
                state.team2.forEach(p => drawPlayer(p[0]*5, p[1]*5, "#448aff"));
                
                // 4. Ball
                ctx.fillStyle = "white"; ctx.shadowBlur = 10; ctx.shadowColor = "white";
                ctx.beginPath(); ctx.arc(state.ball[0]*5, state.ball[1]*5, 5, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
                
                if (state.possession > 0) {
                    ctx.strokeStyle = state.possession === 1 ? "#ff5252" : "#448aff";
                    ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(state.ball[0]*5, state.ball[1]*5, 11, 0, Math.PI*2); ctx.stroke();
                }

                // 5. Update UI
                document.getElementById('match-num').innerText = state.match;
                document.getElementById('step').innerText = state.step + " / 2000";
                document.getElementById('score-a').innerText = state.score[0];
                document.getElementById('score-b').innerText = state.score[1];
                document.getElementById('learning-team').innerText = "Team " + state.training_team;
                document.getElementById('learning-team').style.color = (state.training_team === 1 ? "#ff5252" : "#448aff");
                
                document.getElementById('wins-a').innerText = state.stats.team1_wins;
                document.getElementById('wins-b').innerText = state.stats.team2_wins;
                document.getElementById('draws').innerText = state.stats.draws;
                document.getElementById('goals-a').innerText = state.stats.team1_goals;
                document.getElementById('goals-b').innerText = state.stats.team2_goals;

            } catch (e) {}
        }

        function drawPlayer(x, y, color) {
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(x, y, 9, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 1; ctx.stroke();
        }

        setInterval(update, 100); 
    </script>
</body>
</html>
